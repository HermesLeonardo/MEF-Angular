<h2 mat-dialog-title>Cadastro de Empresa</h2>

<form [formGroup]="empresaForm" (ngSubmit)="salvar()">
  <mat-dialog-content class="modal-content">
    <mat-form-field appearance="fill" class="w-full">
      <mat-label>Nome da Empresa</mat-label>
      <input matInput formControlName="nome">
    </mat-form-field>

    <mat-form-field appearance="fill" class="w-full">
      <mat-label>CNPJ</mat-label>
      <input matInput formControlName="cnpj">
    </mat-form-field>

    <mat-form-field appearance="fill" class="w-full">
      <mat-label>Email do Contato</mat-label>
      <input matInput formControlName="email">
    </mat-form-field>

    <mat-form-field appearance="fill" class="w-full">
      <mat-label>Telefone</mat-label>
      <input matInput formControlName="telefone">
    </mat-form-field>

    <mat-form-field appearance="fill" class="w-full">
      <mat-label>Nome do Responsável</mat-label>
      <input matInput formControlName="responsavel">
    </mat-form-field>

    <mat-form-field appearance="fill" class="w-full">
  <mat-label>Tipo</mat-label>
  <mat-select formControlName="type">
    <mat-option value="company">Empresa</mat-option>
    <mat-option value="client">Cliente</mat-option>
  </mat-select>
</mat-form-field>

<mat-form-field appearance="fill" class="w-full">
  <mat-label>Número de Funcionários</mat-label>
  <input matInput type="number" formControlName="employeeCount" />
</mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions class="dialog-actions">
    <button mat-button type="button" (click)="cancelar()">Cancelar</button>
    <button mat-flat-button color="primary" type="submit">Salvar</button>
  </mat-dialog-actions>
</form>
